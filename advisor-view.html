<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA MFA — Advisor View</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1a18;--paper:#f5f2eb;--cream:#ede9df;--rule:#c8c2b4;
    --accent:#2d5a3d;--accent-light:#e8f0ea;--muted:#7a7568;
    --warn:#8b3a1a;--warn-light:#f5ece8;--blue:#2a5a8b;--blue-light:#e8f0f8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--ink);min-height:100vh}
  .masthead{background:var(--ink);color:var(--paper);padding:20px 32px;border-bottom:3px solid var(--accent);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .masthead-title{font-family:'DM Serif Display',serif;font-size:22px}
  .masthead-sub{font-size:10px;color:var(--rule);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
  .container{max-width:800px;margin:0 auto;padding:32px 24px 80px}

  /* ADVISOR SELECTOR */
  .advisor-select{display:flex;gap:12px;margin-bottom:32px}
  .adv-btn{flex:1;padding:16px;border:2px solid var(--rule);background:white;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;border-radius:2px;transition:all .15s;font-weight:500}
  .adv-btn:hover{border-color:var(--accent);background:var(--accent-light)}
  .adv-btn.active{border-color:var(--accent);background:var(--accent);color:white}

  /* STUDENT CARDS */
  .student-card{background:white;border:1px solid var(--rule);border-radius:2px;margin-bottom:16px;box-shadow:2px 2px 0 var(--cream);overflow:hidden}
  .card-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .1s;gap:12px}
  .card-header:hover{background:var(--paper)}
  .card-header-left{}
  .student-name{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:2px}
  .student-meta{font-size:11px;color:var(--muted)}
  .card-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .stage-1{background:#e8a020}
  .stage-2{background:var(--accent)}
  .stage-3{background:var(--rule)}
  .toggle-arrow{font-size:12px;color:var(--muted);transition:transform .2s}
  .toggle-arrow.open{transform:rotate(180deg)}

  .card-body{display:none;padding:0 20px 20px;border-top:1px solid var(--cream)}
  .card-body.open{display:block}

  .section-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}

  /* INTERESTS */
  .interest-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
  .badge{display:inline-block;padding:3px 9px;font-size:10px;border-radius:2px}
  .badge-3cr{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent)}
  .badge-1cr{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue)}

  /* COURSE CHECKBOXES */
  .course-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
  .course-check-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--rule);border-radius:2px;cursor:pointer;font-size:11.5px;transition:all .1s;background:white;line-height:1.3}
  .course-check-row:hover{border-color:var(--accent);background:var(--accent-light)}
  .course-check-row.checked{border-color:var(--accent);background:var(--accent-light)}
  .course-check-row.checked-1cr{border-color:var(--blue);background:var(--blue-light)}
  .chk{width:14px;height:14px;border:1.5px solid var(--rule);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
  .course-check-row.checked .chk{background:var(--accent);border-color:var(--accent);color:white}
  .course-check-row.checked-1cr .chk{background:var(--blue);border-color:var(--blue);color:white}

  .notes-area{width:100%;padding:10px 12px;border:1px solid var(--rule);background:var(--paper);font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);border-radius:2px;resize:vertical;min-height:70px;margin-top:4px}
  .notes-area:focus{outline:none;border-color:var(--accent);background:white}

  .save-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;background:var(--ink);color:var(--paper);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;margin-top:14px;transition:background .15s}
  .save-btn:hover{background:var(--accent)}
  .save-btn:disabled{background:var(--rule);cursor:not-allowed}
  .save-confirm{font-size:11px;color:var(--accent);margin-top:8px;display:none}
  .save-confirm.show{display:block}

  .divider-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--rule);margin:14px 0 6px;padding-top:14px;border-top:1px dashed var(--rule)}

  .no-students{text-align:center;padding:48px;color:var(--muted);font-size:13px}
  .loading{text-align:center;padding:48px;color:var(--muted);font-size:12px}

  .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}

  .nav-tabs{display:flex;background:var(--cream);border-bottom:2px solid var(--rule);padding:0 28px}
  .tab{padding:12px 20px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);transition:all .15s}
  .tab:hover{color:var(--ink)}
  .tab.active{border-bottom-color:var(--accent);color:var(--ink)}
  .panel{display:none}.panel.active{display:block}

  /* FILL */
  .fill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .fill-card{background:white;border:1px solid var(--rule);border-radius:2px;padding:16px;box-shadow:2px 2px 0 var(--cream)}
  .fill-card-name{font-size:13px;margin-bottom:3px;line-height:1.3}
  .fill-card-meta{font-size:10px;color:var(--muted);margin-bottom:10px}
  .fill-count{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}
  .fill-count-label{font-size:10px;color:var(--muted)}
  .fill-header{display:flex;align-items:start;justify-content:space-between;margin-bottom:10px}
  .fill-bar-wrap{height:6px;background:var(--cream);border-radius:3px;overflow:hidden;margin-bottom:8px;position:relative}
  .fill-bar{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
  .fill-target-line{position:absolute;top:0;bottom:0;width:2px;background:var(--rule)}
  .fill-names{display:flex;flex-wrap:wrap;gap:4px}
  .fill-name-tag{font-size:10px;background:var(--cream);border:1px solid var(--rule);border-radius:2px;padding:2px 7px}
  .fill-name-tag.confirmed{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
  .fill-section-title{font-family:'DM Serif Display',serif;font-size:16px;margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--rule)}

  @media(max-width:500px){
    .course-grid{grid-template-columns:1fr}
    .container{padding:20px 16px 60px}
    .fill-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="masthead">
  <div>
    <div class="masthead-title">Advisor View</div>
    <div class="masthead-sub">IMA MFA · Summer + Fall 2026 Advising</div>
  </div>
</div>

<div class="nav-tabs">
  <div class="tab active" onclick="switchTab('students')">My Students</div>
  <div class="tab" onclick="switchTab('fill')">Class Fill</div>
</div>

<div class="container">

  <div class="panel active" id="panelStudents">
  <div class="advisor-select">
    <button class="adv-btn" id="btnAndrew" onclick="selectAdvisor('Andrew')">Andrew</button>
    <button class="adv-btn" id="btnBetty" onclick="selectAdvisor('Betty')">Betty</button>
  </div>

  <div id="studentList"><div class="loading">Select an advisor above to see their students.</div></div>
  </div><!-- /panelStudents -->

  <!-- CLASS FILL PANEL -->
  <div class="panel" id="panelFill">
    <div id="fillContent"><div style="padding:40px;text-align:center;color:var(--muted);font-size:12px">Loading class fill data…</div></div>
  </div>

</div>

<script>
const CONFIG = { APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwDKUxR9ws_uUOzTYVcmFD2IjUa7OAz5h0ArnUxfLJtZ6q7lonmHyGIH_K-aydSsDA8/exec' };

const COURSES_3CR = [
  'Blank Screen','History and Theory of Documentary','Emerging Media 1','Digital Resistance',
  'Story Strategies','Language to be Looked At',
  'Community Media and Advocacy & The Urban Environment',
  'Doc 2: The Short Film','Documentary 1','Sound Environments',
  'Memory Chamber: Virtual Environments for Interactive Media and Film',
  'Experimental Darkroom','Sound Design for Filmmakers'
];
const COURSES_1CR = [
  'Lighting','Premiere Editing and Post Production Workflow',
  'Sound Recording','Impact Producing',
  'From Body to Movement: Performative Art and Film'
];

let currentAdvisor = '';
let allStudents = [];

function selectAdvisor(name) {
  currentAdvisor = name;
  document.getElementById('btnAndrew').classList.toggle('active', name === 'Andrew');
  document.getElementById('btnBetty').classList.toggle('active', name === 'Betty');
  loadStudents();
}

async function loadStudents() {
  document.getElementById('studentList').innerHTML = '<div class="loading">Loading…</div>';
  try {
    const res = await api('getAdminData', {});
    allStudents = (res.students || []).filter(s => s.advisor === currentAdvisor && s.stage >= 1);
    allStudents.sort((a, b) => a.slotDay > b.slotDay ? 1 : a.slotDay < b.slotDay ? -1 : a.slotTime > b.slotTime ? 1 : -1);
    renderStudents();
  } catch(e) {
    document.getElementById('studentList').innerHTML = '<div class="no-students">Error loading. Please refresh.</div>';
  }
}

function renderStudents() {
  const list = document.getElementById('studentList');
  if (!allStudents.length) {
    list.innerHTML = '<div class="no-students">No booked students yet for ' + currentAdvisor + '.</div>';
    return;
  }

  list.innerHTML = allStudents.map((s, idx) => {
    const interests3 = (s.threeCreditInterests || []).map(c => `<span class="badge badge-3cr">${c}</span>`).join('');
    const interests1 = (s.oneCreditInterests || []).map(c => `<span class="badge badge-1cr">${c}</span>`).join('');
    const stageLabel = ['','Booked','Met','Complete'][s.stage] || '';

    const courses3html = COURSES_3CR.map(c => {
      const isChecked = (s.finalCourses||[]).includes(c);
      return `<div class="course-check-row${isChecked?' checked':''}" onclick="toggleCourse(this,'${s.emplid}','${c.replace(/'/g,"\\'")}','3cr')">
        <div class="chk">${isChecked?'✓':''}</div><span>${c}</span>
      </div>`;
    }).join('');

    const courses1html = COURSES_1CR.map(c => {
      const isChecked = (s.finalCourses||[]).includes(c);
      return `<div class="course-check-row${isChecked?' checked-1cr':''}" onclick="toggleCourse(this,'${s.emplid}','${c.replace(/'/g,"\\'")}','1cr')">
        <div class="chk">${isChecked?'✓':''}</div><span>${c}</span>
      </div>`;
    }).join('');

    return `<div class="student-card">
      <div class="card-header" onclick="toggleCard('card-${idx}')">
        <div class="card-header-left">
          <div class="student-name">${s.name}</div>
          <div class="student-meta">${s.slotDay} at ${s.slotTime} · ${s.credits ? s.credits + ' credits' : 'credits unknown'}</div>
        </div>
        <div class="card-header-right">
          <div class="stage-dot stage-${s.stage}"></div>
          <span style="font-size:10px;color:var(--muted)">${stageLabel}</span>
          <span class="toggle-arrow" id="arrow-${idx}">▼</span>
        </div>
      </div>
      <div class="card-body" id="card-${idx}">
        ${interests3 || interests1 ? `
          <div class="section-label">Student's interests</div>
          <div class="interest-badges">${interests3}${interests1}</div>
        ` : ''}
        ${s.notes ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;font-style:italic">"${s.notes}"</div>` : ''}

        <div class="section-label">Pre-register for (3-credit)</div>
        <div class="course-grid" id="grid3-${s.emplid}">${courses3html}</div>

        <div class="divider-label">1-credit workshops</div>
        <div class="course-grid" id="grid1-${s.emplid}">${courses1html}</div>

        <div class="section-label">Notes for coordinator</div>
        <textarea class="notes-area" id="notes-${s.emplid}" placeholder="Any notes about this student's selections…">${s.advisorNotes||''}</textarea>

        <button class="save-btn" id="savebtn-${s.emplid}" onclick="saveStudent('${s.emplid}')">
          Save
        </button>
        <div class="save-confirm" id="saveconfirm-${s.emplid}">✓ Saved</div>
      </div>
    </div>`;
  }).join('');
}

// Track selected courses per student
const selectedCourses = {};

function toggleCourse(el, emplid, course, type) {
  if (!selectedCourses[emplid]) {
    // Initialize from current state
    const student = allStudents.find(s => s.emplid === emplid);
    selectedCourses[emplid] = [...(student.finalCourses || [])];
  }

  const isChecked = el.classList.contains('checked') || el.classList.contains('checked-1cr');
  const selClass = type === '3cr' ? 'checked' : 'checked-1cr';

  if (isChecked) {
    el.classList.remove(selClass);
    el.querySelector('.chk').textContent = '';
    selectedCourses[emplid] = selectedCourses[emplid].filter(c => c !== course);
  } else {
    el.classList.add(selClass);
    el.querySelector('.chk').textContent = '✓';
    selectedCourses[emplid].push(course);
  }
}

async function saveStudent(emplid) {
  const btn = document.getElementById('savebtn-' + emplid);
  const confirm = document.getElementById('saveconfirm-' + emplid);
  const notes = document.getElementById('notes-' + emplid).value;

  // Get courses — use selectedCourses if modified, else current finalCourses
  const student = allStudents.find(s => s.emplid === emplid);
  const courses = selectedCourses[emplid] || student.finalCourses || [];

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  try {
    const res = await api('advisorUpdateStudent', { emplid, courses, advisorNotes: notes });
    if (res.success) {
      confirm.classList.add('show');
      setTimeout(() => confirm.classList.remove('show'), 3000);
      // Update local state
      student.finalCourses = courses;
      student.advisorNotes = notes;
    } else {
      alert('Error saving. Please try again.');
    }
  } catch(e) {
    alert('Error saving. Please try again.');
  }
  btn.disabled = false;
  btn.innerHTML = 'Save';
}

function toggleCard(id) {
  const body = document.getElementById(id);
  const idx = id.replace('card-','');
  const arrow = document.getElementById('arrow-' + idx);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

async function api(action, params) {
  const url = CONFIG.APPS_SCRIPT_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(params));
  const r = await fetch(url);
  return r.json();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['students','fill'][i] === tab));
  document.getElementById('panelStudents').classList.toggle('active', tab === 'students');
  document.getElementById('panelFill').classList.toggle('active', tab === 'fill');
  if (tab === 'fill' && allStudents.length === 0) loadFillData();
  if (tab === 'fill') loadFillData();
}

const COURSES_3CR_ALL = [
  'Blank Screen','History and Theory of Documentary','Emerging Media 1','Digital Resistance',
  'Story Strategies','Language to be Looked At',
  'Community Media and Advocacy & The Urban Environment',
  'Doc 2: The Short Film','Documentary 1','Sound Environments',
  'Memory Chamber: Virtual Environments for Interactive Media and Film',
  'Experimental Darkroom','Sound Design for Filmmakers'
];
const COURSES_1CR_ALL = [
  'Lighting','Premiere Editing and Post Production Workflow',
  'Sound Recording','Impact Producing',
  'From Body to Movement: Performative Art and Film'
];
const TARGET = 12;

async function loadFillData() {
  document.getElementById('fillContent').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:12px">Loading…</div>';
  try {
    const res = await api('getAdminData', {});
    const students = res.students || [];
    renderFill(students);
  } catch(e) {
    document.getElementById('fillContent').innerHTML = '<div style="padding:40px;text-align:center;color:var(--warn);font-size:12px">Error loading data.</div>';
  }
}

function renderFill(students) {
  const interestCount = {}, confirmedCount = {};
  const interestNames = {}, confirmedNames = {};

  [...COURSES_3CR_ALL, ...COURSES_1CR_ALL].forEach(c => {
    interestCount[c] = 0; confirmedCount[c] = 0;
    interestNames[c] = []; confirmedNames[c] = [];
  });

  students.forEach(s => {
    (s.threeCreditInterests||[]).concat(s.oneCreditInterests||[]).forEach(c => {
      if (interestCount[c] !== undefined) { interestCount[c]++; interestNames[c].push(s.name); }
    });
    (s.finalCourses||[]).forEach(c => {
      if (confirmedCount[c] !== undefined) { confirmedCount[c]++; confirmedNames[c].push(s.name); }
    });
  });

  function makeCard(c) {
    const confirmed = confirmedCount[c] || 0;
    const interested = interestCount[c] || 0;
    const total = confirmed || interested;
    const pct = Math.min(100, Math.round((total / TARGET) * 100));
    const targetPct = Math.round((TARGET / TARGET) * 100);
    const names = confirmedNames[c].map(n => `<span class="fill-name-tag confirmed">${n.split(' ')[0]} ${n.split(' ').slice(-1)[0]}</span>`).join('') +
      interestNames[c].filter(n => !confirmedNames[c].includes(n)).map(n => `<span class="fill-name-tag">${n.split(' ')[0]} ${n.split(' ').slice(-1)[0]}</span>`).join('');
    return `<div class="fill-card">
      <div class="fill-header">
        <div>
          <div class="fill-card-name">${c}</div>
          <div class="fill-card-meta">${confirmed > 0 ? confirmed + ' confirmed · ' : ''}${interested} interested · target ${TARGET}</div>
        </div>
        <div style="text-align:right">
          <div class="fill-count">${confirmed || interested}</div>
          <div class="fill-count-label">/ ${TARGET}</div>
        </div>
      </div>
      <div class="fill-bar-wrap">
        <div class="fill-bar" style="width:${pct}%"></div>
        <div class="fill-target-line" style="left:${targetPct}%"></div>
      </div>
      <div class="fill-names">${names || '<span style="font-size:10px;color:var(--rule)">No sign-ups yet</span>'}</div>
    </div>`;
  }

  document.getElementById('fillContent').innerHTML = `
    <div class="fill-section-title">3-Credit Courses — Fall 2026</div>
    <div class="fill-grid">${COURSES_3CR_ALL.map(makeCard).join('')}</div>
    <div class="fill-section-title" style="margin-top:28px">1-Credit Workshops</div>
    <div class="fill-grid">${COURSES_1CR_ALL.map(makeCard).join('')}</div>
  `;
}
</script>
</body>
</html>
