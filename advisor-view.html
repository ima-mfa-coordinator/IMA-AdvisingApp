<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA MFA — Advisor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --cream: #ede9df;
    --rule: #c8c2b4;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --warn: #8b3a1a;
    --warn-light: #f5ece8;
    --muted: #7a7568;
    --amber: #8b5e00;
    --amber-light: #fdf3e0;
    --blue: #1a3a5a;
    --blue-light: #e8eef5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Mono', monospace; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .masthead {
    background: var(--ink); color: var(--paper);
    padding: 20px 32px;
    border-bottom: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .masthead-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .masthead-sub { font-size: 10px; color: var(--rule); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .masthead-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; font-family: 'DM Mono', monospace; font-size: 11px;
    font-weight: 500; border: 1px solid transparent; border-radius: 2px;
    cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .btn:hover { opacity: 0.8; }
  .btn-ghost { background: transparent; border-color: var(--rule); color: var(--paper); }
  .btn-accent { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .btn-warn { background: var(--warn); color: var(--paper); border-color: var(--warn); }
  .btn-ink { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-plain { background: var(--cream); color: var(--ink); border-color: var(--rule); }

  .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--ink); color: var(--paper);
    border-radius: 2px; padding: 16px 18px;
  }
  .stat-card.green { background: var(--accent); }
  .stat-card.amber { background: var(--amber); }
  .stat-card.blue { background: var(--blue); }
  .stat-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1; }
  .stat-sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; }

  .tabs { display: flex; gap: 0; border-bottom: 1.5px solid var(--rule); margin-bottom: 20px; }
  .tab {
    padding: 10px 20px; font-size: 11px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    border: none; background: none; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1.5px;
    transition: color 0.15s;
  }
  .tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }

  .panel { display: none; }
  .panel.active { display: block; }

  .controls-bar {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px;
  }
  .search-box {
    flex: 1; min-width: 200px; padding: 9px 12px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    border: 1px solid var(--rule); background: white; border-radius: 2px; color: var(--ink);
  }
  .search-box:focus { outline: none; border-color: var(--ink); }
  .filter {
    padding: 9px 12px; font-family: 'DM Mono', monospace; font-size: 11px;
    border: 1px solid var(--rule); background: white; border-radius: 2px; color: var(--ink);
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  thead tr { background: var(--ink); color: var(--paper); }
  th { padding: 10px 12px; text-align: left; font-weight: 500; letter-spacing: 0.05em; white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--cream); vertical-align: top; }
  tr:hover td { background: var(--cream); }
  .no-data { text-align: center; padding: 32px; color: var(--muted); font-size: 12px; }

  .stage-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 2px; font-size: 10px; font-weight: 500;
    letter-spacing: 0.04em; white-space: nowrap;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .s0 { background: #f0ede6; color: var(--muted); }
  .s0 .dot { background: var(--muted); }
  .s1 { background: var(--amber-light); color: var(--amber); }
  .s1 .dot { background: var(--amber); }
  .s2 { background: var(--blue-light); color: var(--blue); }
  .s2 .dot { background: var(--blue); }
  .s3 { background: var(--accent-light); color: var(--accent); }
  .s3 .dot { background: var(--accent); }

  .action-btn {
    padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 10px;
    border: 1px solid var(--rule); border-radius: 2px; background: white;
    cursor: pointer; color: var(--ink); margin-right: 4px;
    transition: background 0.1s;
  }
  .action-btn:hover { background: var(--cream); }
  .action-btn.accent { border-color: var(--accent); color: var(--accent); }
  .action-btn.warn { border-color: var(--warn); color: var(--warn); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,26,24,0.6); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper); border-radius: 2px;
    width: 100%; max-width: 560px; max-height: 90vh;
    overflow-y: auto; border: 1.5px solid var(--rule);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal-header {
    padding: 20px 24px 14px; border-bottom: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .modal-sub { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.05em; }
  .modal-close {
    background: none; border: none; cursor: pointer; font-size: 18px;
    color: var(--muted); padding: 0 4px; line-height: 1;
  }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 14px 24px; border-top: 1px solid var(--rule);
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .modal-label {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 5px; margin-top: 14px;
  }
  .modal-label:first-child { margin-top: 0; }
  .modal-val { font-size: 12px; color: var(--ink); line-height: 1.5; }
  .modal-divider { border: none; border-top: 1px solid var(--cream); margin: 16px 0; }

  .modal-ta {
    width: 100%; padding: 10px 12px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    border: 1px solid var(--rule); background: white; border-radius: 2px;
    resize: vertical; min-height: 80px; color: var(--ink); line-height: 1.5;
    transition: border-color 0.15s;
  }
  .modal-ta:focus { outline: none; border-color: var(--ink); }
  .save-indicator {
    font-size: 10px; color: var(--muted); text-align: right;
    margin-top: 3px; min-height: 14px; transition: color 0.2s;
  }
  .save-indicator.saving { color: var(--amber); }
  .save-indicator.saved { color: var(--accent); }
  .save-indicator.error { color: var(--warn); }

  /* FILL PANEL */
  .fill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .fill-card {
    background: white; border: 1px solid var(--rule); border-radius: 2px; padding: 14px;
  }
  .fill-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .fill-prof { font-size: 10px; color: var(--muted); margin-bottom: 10px; }
  .fill-bar-wrap { background: var(--cream); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .fill-bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s; }
  .fill-bar.warn { background: var(--warn); }
  .fill-bar.amber { background: var(--amber); }
  .fill-counts { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  .fill-credit-tag {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    font-size: 9px; background: var(--cream); color: var(--muted);
    margin-bottom: 8px;
  }

  /* SLOTS PANEL */
  .slots-grid { display: flex; gap: 20px; flex-wrap: wrap; }
  .advisor-block {
    flex: 1; min-width: 260px; background: white;
    border: 1px solid var(--rule); border-radius: 2px; overflow: hidden;
  }
  .advisor-block-title {
    background: var(--ink); color: var(--paper);
    padding: 10px 14px; font-size: 12px; font-weight: 500;
    display: flex; justify-content: space-between; align-items: center;
  }
  .day-section { padding: 8px 14px; border-bottom: 1px solid var(--cream); }
  .day-name { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .slot-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; font-size: 11px; border-bottom: 1px solid var(--cream);
  }
  .slot-row:last-child { border-bottom: none; }
  .slot-row.break-slot { color: var(--muted); font-style: italic; }
  .slot-row.booked { color: var(--accent); }
  .slot-row.open { color: var(--muted); }
  .slot-open-tag { font-size: 9px; background: var(--accent-light); color: var(--accent); padding: 2px 6px; border-radius: 2px; }
  .slot-name { font-size: 10px; color: var(--accent); }

  .refresh-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; font-size: 10px; color: var(--muted);
  }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .masthead { padding: 16px 20px; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div>
    <div class="masthead-title">Advisor Dashboard</div>
    <div class="masthead-sub">IMA MFA — Spring/Summer 2026 Advising</div>
  </div>
  <div class="masthead-actions">
    <button class="btn btn-ghost" onclick="sendReminders('unbooked')">Remind: Not Booked</button>
    <button class="btn btn-ghost" onclick="sendReminders('postMeeting')">Remind: Post-Meeting</button>
    <button class="btn btn-ghost" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-accent" onclick="loadData()">↺ Refresh</button>
  </div>
</div>

<div class="main">

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Students</div><div class="stat-num" id="sTotal">—</div><div class="stat-sub">in program</div></div>
    <div class="stat-card amber"><div class="stat-label">Not Booked</div><div class="stat-num" id="sUnbooked">—</div><div class="stat-sub">need reminder</div></div>
    <div class="stat-card blue"><div class="stat-label">Booked / Met</div><div class="stat-num" id="sBooked">—</div><div class="stat-sub">slot secured</div></div>
    <div class="stat-card green"><div class="stat-label">Complete</div><div class="stat-num" id="sComplete">—</div><div class="stat-sub">all 3 stages done</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('students', this)">Students</button>
    <button class="tab" onclick="switchTab('fill', this)">Class Fill</button>
    <button class="tab" onclick="switchTab('slots', this)">Slot Grid</button>
  </div>

  <!-- STUDENTS PANEL -->
  <div class="panel active" id="panelStudents">
    <div class="refresh-bar">
      <span id="lastRefresh">Loading…</span>
      <span id="visibleCount" style="color:var(--ink)"></span>
    </div>
    <div class="controls-bar">
      <input class="search-box" type="text" id="searchBox" placeholder="Search name or EMPLID…" oninput="filterTable()">
      <select class="filter" id="stageFilter" onchange="filterTable()">
        <option value="">All stages</option>
        <option value="0">Not booked</option>
        <option value="1">Slot booked</option>
        <option value="2">Met — pending</option>
        <option value="3">Complete</option>
      </select>
      <select class="filter" id="advisorFilter" onchange="filterTable()">
        <option value="">All advisors</option>
        <option value="Andrew">Andrew</option>
        <option value="Betty">Betty</option>
      </select>
    </div>
    <div class="table-wrap">
      <table id="mainTable">
        <thead>
          <tr>
            <th>Student</th><th>EMPLID</th><th>Cr</th><th>Stage</th><th>Advisor</th>
            <th>Slot</th><th>3-Cr Interests</th><th>1-Cr Interests</th><th>Final Courses</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="10" class="no-data">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- FILL PANEL -->
  <div class="panel" id="panelFill">
    <div id="fillContent"><div class="no-data">Loading…</div></div>
  </div>

  <!-- SLOTS PANEL -->
  <div class="panel" id="panelSlots">
    <div class="slots-grid" id="slotsGrid"><div style="font-size:12px;color:var(--muted);padding:20px">Loading slots…</div></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mName"></div>
        <div class="modal-sub" id="mEmplid"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-footer" id="mFooter"></div>
  </div>
</div>

<script>
const CONFIG = {
  APPS_SCRIPT_URL: 'YOUR_APPS_SCRIPT_URL_HERE'
};

const STAGE_LABELS = {
  0: ['Not Booked', 's0'],
  1: ['Slot Booked', 's1'],
  2: ['Met — Pending', 's2'],
  3: ['Complete', 's3']
};

const COURSES_3CR = [
  {id:'IMA78041', name:'Blank Screen', prof:'Zach Nader'},
  {id:'IMA78054', name:'Impact Producing', prof:'Cecilia Mejia'},
  {id:'IMA70900', name:'History and Theory of Documentary', prof:'Reiko Tahara'},
  {id:'IMA75000', name:'Emerging Media 1', prof:'Ricardo Miranda'},
  {id:'IMA78087', name:'Digital Resistance', prof:'kara lynch'},
  {id:'IMA78052', name:'Story Strategies', prof:'Andrew Lund'},
  {id:'IMA78065', name:'Language to be Looked At', prof:'Andrew Demirjian'},
  {id:'IMA77100', name:'Community Media and Advocacy & The Urban Environment', prof:'Amber Bemak'},
  {id:'IMA75300', name:'Doc 2: The Short Film', prof:'Alex Mallis'},
  {id:'IMA75100', name:'Documentary 1', prof:'Edwin Martinez'},
  {id:'IMA78081', name:'Sound Environments', prof:'Hans Tammen'},
  {id:'IMA76600', name:'Memory Chamber: 3D Environments for Interactive Media and Film', prof:'Poyen Wang'},
  {id:'IMA78077', name:'Experimental Darkroom (Summer)', prof:'Christina Freeman'},
  {id:'IMA78079', name:'Sound Design for Filmmakers (Summer)', prof:'David Briggs'},
];
const COURSES_1CR = [
  {id:'IMA78302', name:'Lighting', prof:'Sean Hanley'},
  {id:'IMA78313', name:'Premiere Editing and Post Production Workflow', prof:'Iris Devins'},
  {id:'IMA78301', name:'Sound Recording', prof:'JT Takagi'},
  {id:'IMA78360', name:'Impact Producing Workshop', prof:'Cecilia Mejia'},
  {id:'IMA78349', name:'From Body to Movement: Performative Art and Film (Summer)', prof:'Yehui Zhao'},
];

let allStudents = [];
let allSlots = {};
let currentTab = 'students';

// ── AUTOSAVE ───────────────────────────────────────────────
let saveTimers = {};

document.addEventListener('input', function(e) {
  if (!e.target.classList.contains('modal-ta')) return;
  const field = e.target.dataset.field;
  const emplid = e.target.dataset.emplid;
  const value = e.target.value;
  const indId = 'ind-' + field + '-' + emplid;
  const ind = document.getElementById(indId);

  clearTimeout(saveTimers[indId]);
  if (ind) { ind.textContent = 'Unsaved…'; ind.className = 'save-indicator'; }

  saveTimers[indId] = setTimeout(async () => {
    if (ind) { ind.textContent = 'Saving…'; ind.className = 'save-indicator saving'; }
    try {
      await api('saveAdvisorNotes', { emplid, field, value });
      // Update local cache
      const s = allStudents.find(x => String(x.emplid) === String(emplid));
      if (s) s[field] = value;
      if (ind) {
        ind.textContent = 'Saved ✓';
        ind.className = 'save-indicator saved';
        setTimeout(() => { if (ind) { ind.textContent = ''; ind.className = 'save-indicator'; } }, 2000);
      }
    } catch(err) {
      if (ind) { ind.textContent = 'Error saving'; ind.className = 'save-indicator error'; }
    }
  }, 1000);
});

// ── API ────────────────────────────────────────────────────
async function api(action, params) {
  const url = CONFIG.APPS_SCRIPT_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(params));
  const r = await fetch(url);
  return r.json();
}

// ── LOAD DATA ──────────────────────────────────────────────
async function loadData() {
  document.getElementById('lastRefresh').textContent = 'Loading…';
  try {
    const res = await api('getAdminData', {});
    allStudents = res.students || [];
    allSlots = res.slots || {};
    updateStats(allStudents);
    filterTable();
    renderFill(allStudents);
    renderSlots(allSlots);
    document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="no-data">Error loading. Please refresh.</td></tr>';
    document.getElementById('lastRefresh').textContent = 'Error — click Refresh';
  }
}

// ── STATS ──────────────────────────────────────────────────
function updateStats(students) {
  document.getElementById('sTotal').textContent = students.length;
  document.getElementById('sUnbooked').textContent = students.filter(s => s.stage === 0).length;
  document.getElementById('sBooked').textContent = students.filter(s => s.stage >= 1).length;
  document.getElementById('sComplete').textContent = students.filter(s => s.stage === 3).length;
}

// ── TABLE ──────────────────────────────────────────────────
function filterTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const stage = document.getElementById('stageFilter').value;
  const advisor = document.getElementById('advisorFilter').value;

  let filtered = allStudents.filter(s => {
    if (q && !s.name.toLowerCase().includes(q) && !String(s.emplid).includes(q)) return false;
    if (stage !== '' && String(s.stage) !== stage) return false;
    if (advisor && s.advisor !== advisor) return false;
    return true;
  });

  document.getElementById('visibleCount').textContent = filtered.length + ' student' + (filtered.length !== 1 ? 's' : '');
  renderStudents(filtered);
}

function renderStudents(students) {
  const tbody = document.getElementById('tableBody');
  if (!students.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-data">No students match your filters.</td></tr>';
    return;
  }
  tbody.innerHTML = students.map(s => {
    const [lbl, cls] = STAGE_LABELS[s.stage] || ['Unknown', 's0'];
    const interests3 = (s.courseInterests || []).join(', ') || '—';
    const interests1 = (s.courseInterests1 || []).join(', ') || '—';
    const final = (s.finalCourses || []).join(', ') || '—';
    const slot = s.slotDay ? `${s.slotDay}${s.slotTime ? ' · ' + s.slotTime : ''}` : '—';
    return `<tr>
      <td style="font-weight:500">${s.name}</td>
      <td style="color:var(--muted)">${s.emplid}</td>
      <td>${s.credits || '—'}</td>
      <td><span class="stage-badge ${cls}"><span class="dot"></span>${lbl}</span></td>
      <td>${s.advisor || '—'}</td>
      <td style="white-space:nowrap;font-size:10px">${slot}</td>
      <td style="font-size:10px;max-width:180px">${interests3}</td>
      <td style="font-size:10px;max-width:160px">${interests1}</td>
      <td style="font-size:10px;max-width:180px">${final}</td>
      <td style="white-space:nowrap">
        <button class="action-btn" onclick="openModal('${s.emplid}')">View</button>
        ${s.stage === 1 ? `<button class="action-btn accent" onclick="markMet('${s.emplid}')">Mark Met</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

// ── CLASS FILL ─────────────────────────────────────────────
function renderFill(students) {
  const counts = {};
  students.forEach(s => {
    [...(s.courseInterests || []), ...(s.courseInterests1 || [])].forEach(c => {
      counts[c] = (counts[c] || { interested: 0, confirmed: 0 });
      counts[c].interested++;
    });
    (s.finalCourses || []).forEach(c => {
      if (!counts[c]) counts[c] = { interested: 0, confirmed: 0 };
      counts[c].confirmed++;
    });
  });

  const allCourses = [...COURSES_3CR, ...COURSES_1CR];
  const fillEl = document.getElementById('fillContent');

  const cards = allCourses.map(course => {
    const c = counts[course.name] || { interested: 0, confirmed: 0 };
    const cap = 15;
    const pct = Math.min(100, Math.round((c.interested / cap) * 100));
    const barClass = pct >= 90 ? 'warn' : pct >= 70 ? 'amber' : '';
    const creditTag = COURSES_1CR.find(x => x.id === course.id) ? '1 credit' : '3 credits';
    return `<div class="fill-card">
      <div class="fill-credit-tag">${creditTag}</div>
      <div class="fill-name">${course.name}</div>
      <div class="fill-prof">${course.prof}</div>
      <div class="fill-bar-wrap"><div class="fill-bar ${barClass}" style="width:${pct}%"></div></div>
      <div class="fill-counts">
        <span>${c.interested} interested</span>
        <span>${c.confirmed} confirmed · cap ~${cap}</span>
      </div>
    </div>`;
  }).join('');

  fillEl.innerHTML = `<div class="fill-grid">${cards}</div>`;
}

// ── SLOT GRID ──────────────────────────────────────────────
function renderSlots(slotsData) {
  const grid = document.getElementById('slotsGrid');
  if (!slotsData || (!slotsData.Andrew && !slotsData.Betty)) {
    grid.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:20px">No availability configured yet.</div>';
    return;
  }
  grid.innerHTML = ['Andrew', 'Betty'].map(adv => {
    const days = slotsData[adv] || [];
    const totalSlots = days.reduce((a, d) => a + d.slots.filter(s => !s.isBreak).length, 0);
    const booked = days.reduce((a, d) => a + d.slots.filter(s => s.bookedBy).length, 0);
    const dayHTML = days.map(day => {
      const rows = day.slots.map(slot => {
        if (slot.isBreak) return `<div class="slot-row break-slot"><span>${slot.time}</span><span style="font-size:10px">break</span></div>`;
        if (slot.bookedBy) return `<div class="slot-row booked"><span>${slot.time}</span><span class="slot-name">${slot.bookedBy}</span></div>`;
        return `<div class="slot-row open"><span>${slot.time}</span><span class="slot-open-tag">open</span></div>`;
      }).join('');
      return `<div class="day-section"><div class="day-name">${day.label}</div>${rows}</div>`;
    }).join('');
    return `<div class="advisor-block">
      <div class="advisor-block-title">
        <span>${adv}</span>
        <span style="font-size:11px;opacity:0.6">${booked}/${totalSlots} booked</span>
      </div>
      ${dayHTML}
    </div>`;
  }).join('');
}

// ── MODAL ──────────────────────────────────────────────────
function openModal(emplid) {
  const s = allStudents.find(x => String(x.emplid) === String(emplid));
  if (!s) return;
  const [lbl, cls] = STAGE_LABELS[s.stage] || ['Unknown', 's0'];

  document.getElementById('mName').textContent = s.name;
  document.getElementById('mEmplid').textContent = `EMPLID: ${s.emplid}${s.credits ? ' · ' + s.credits + ' credits' : ''}`;

  document.getElementById('mBody').innerHTML = `
    <div class="modal-label">Stage</div>
    <span class="stage-badge ${cls}"><span class="dot"></span>${lbl}</span>

    <div class="modal-label">Advisor / Slot</div>
    <div class="modal-val">${s.advisor || '—'}${s.slotDay ? ' · ' + s.slotDay + (s.slotTime ? ' at ' + s.slotTime : '') : ''}</div>

    ${s.meetLink ? `<div class="modal-label">Meet Link</div>
    <div class="modal-val"><a href="${s.meetLink}" target="_blank" style="color:var(--accent)">${s.meetLink}</a></div>` : ''}

    <div class="modal-label">3-Cr Course Interests</div>
    <div class="modal-val">${(s.courseInterests || []).join(', ') || '—'}</div>

    <div class="modal-label">1-Cr Course Interests</div>
    <div class="modal-val">${(s.courseInterests1 || []).join(', ') || '—'}</div>

    <div class="modal-label">Student Notes / Questions</div>
    <div class="modal-val" style="font-style:italic">${s.notes || '—'}</div>

    <div class="modal-label">Final Courses</div>
    <div class="modal-val">${(s.finalCourses || []).join(', ') || 'Not submitted yet'}</div>

    ${(s.registeredCourses || []).length ? `<div class="modal-label">Registered in Sheet</div>
    <div class="modal-val">${s.registeredCourses.join(', ')}</div>` : ''}

    <hr class="modal-divider">

    <div class="modal-label">Meeting Notes</div>
    <textarea class="modal-ta" id="ta-notes-${s.emplid}" data-field="advisorNotes" data-emplid="${s.emplid}"
      placeholder="Notes from this advising meeting…">${s.advisorNotes || ''}</textarea>
    <div class="save-indicator" id="ind-advisorNotes-${s.emplid}"></div>

    <div class="modal-label">Program Feedback</div>
    <textarea class="modal-ta" id="ta-prog-${s.emplid}" data-field="programFeedback" data-emplid="${s.emplid}"
      placeholder="Feedback on student's program progress, trajectory, concerns…">${s.programFeedback || ''}</textarea>
    <div class="save-indicator" id="ind-programFeedback-${s.emplid}"></div>

    <div class="modal-label">Other Notes</div>
    <textarea class="modal-ta" id="ta-other-${s.emplid}" data-field="otherNotes" data-emplid="${s.emplid}"
      placeholder="Any other notes…">${s.otherNotes || ''}</textarea>
    <div class="save-indicator" id="ind-otherNotes-${s.emplid}"></div>
  `;

  const footer = document.getElementById('mFooter');
  footer.innerHTML = '';
  if (s.stage === 0) {
    footer.innerHTML += `<button class="btn btn-warn" onclick="sendOneReminder('${s.emplid}','unbooked');closeModal()">Send Booking Reminder</button>`;
  }
  if (s.stage === 1) {
    footer.innerHTML += `<button class="btn btn-accent" onclick="markMet('${s.emplid}')">Mark as Met</button>`;
  }
  if (s.stage === 2) {
    footer.innerHTML += `<button class="btn btn-accent" onclick="sendOneReminder('${s.emplid}','postMeeting');closeModal()">Re-send Post-Meeting Email</button>`;
  }
  footer.innerHTML += `<button class="btn btn-plain" onclick="closeModal()">Close</button>`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── ACTIONS ────────────────────────────────────────────────
async function markMet(emplid) {
  if (!confirm('Mark this student as met? This will send them the post-meeting email.')) return;
  const res = await api('markMet', { emplid });
  if (res.success) {
    alert('Student marked as met. Post-meeting email sent.');
    closeModal();
    loadData();
  } else {
    alert('Error: ' + (res.message || 'Could not update.'));
  }
}

async function sendReminders(type) {
  if (!confirm(`Send reminders to all eligible students (type: ${type})?`)) return;
  const res = await api('sendBulkReminders', { type });
  alert(`Reminders sent to ${res.count || 0} students.`);
  loadData();
}

async function sendOneReminder(emplid, type) {
  const res = await api('sendReminder', { emplid, type });
  if (res.success) alert('Reminder sent.');
  else alert('Error: ' + (res.message || 'Could not send.'));
}

// ── EXPORT ─────────────────────────────────────────────────
function exportCSV() {
  const headers = ['EMPLID','Name','Credits','Stage','Advisor','Slot Day','Slot Time','3-Cr Interests','1-Cr Interests','Final Courses','Meeting Notes','Program Feedback','Other Notes'];
  const rows = allStudents.map(s => [
    s.emplid, s.name, s.credits || '', s.stage,
    s.advisor || '', s.slotDay || '', s.slotTime || '',
    (s.courseInterests || []).join('; '),
    (s.courseInterests1 || []).join('; '),
    (s.finalCourses || []).join('; '),
    (s.advisorNotes || '').replace(/\n/g, ' '),
    (s.programFeedback || '').replace(/\n/g, ' '),
    (s.otherNotes || '').replace(/\n/g, ' ')
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'IMA_Advising_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// ── TAB SWITCHING ──────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

// ── INIT ───────────────────────────────────────────────────
loadData();
setInterval(loadData, 120000); // auto-refresh every 2 min
</script>
