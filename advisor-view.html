<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA MFA — Advisor View</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --cream: #ede9df;
    --rule: #c8c2b4;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --warn: #8b3a1a;
    --muted: #7a7568;
    --amber: #8b5e00;
    --amber-light: #fdf3e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Mono', monospace; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .picker {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px; padding: 40px;
  }
  .picker-title { font-family: 'DM Serif Display', serif; font-size: 32px; text-align: center; }
  .picker-sub { font-size: 12px; color: var(--muted); text-align: center; }
  .picker-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .picker-btn {
    padding: 20px 48px; font-family: 'DM Mono', monospace; font-size: 14px;
    font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    border: 1.5px solid var(--ink); background: white; cursor: pointer;
    border-radius: 2px; transition: all 0.15s;
  }
  .picker-btn:hover { background: var(--ink); color: var(--paper); }

  .main { display: none; }
  .main.active { display: block; }

  .masthead {
    background: var(--ink); color: var(--paper);
    padding: 16px 28px; border-bottom: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .masthead-left { display: flex; align-items: center; gap: 16px; }
  .masthead-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .masthead-advisor {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--accent); padding: 4px 10px; border-radius: 2px;
  }
  .switch-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
    text-transform: uppercase; background: transparent; border: 1px solid rgba(255,255,255,0.3);
    color: var(--paper); padding: 6px 14px; border-radius: 2px; cursor: pointer;
  }
  .switch-btn:hover { border-color: white; }

  .content { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }

  .day-section { margin-bottom: 32px; }
  .day-heading {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1.5px solid var(--rule);
    padding-bottom: 8px; margin-bottom: 12px;
  }

  .student-card {
    background: white; border: 1px solid var(--rule); border-radius: 2px;
    margin-bottom: 10px; overflow: hidden;
  }
  .student-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; cursor: pointer; gap: 12px; transition: background 0.1s;
  }
  .student-card-header:hover { background: var(--cream); }
  .student-card.open .student-card-header { background: var(--ink); color: var(--paper); }
  .student-name { font-size: 14px; font-weight: 500; }
  .student-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .student-card.open .student-meta { color: rgba(255,255,255,0.55); }
  .slot-time { font-size: 12px; white-space: nowrap; }
  .student-card.open .slot-time { color: rgba(255,255,255,0.8); }
  .stage-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--muted); }
  .stage-dot.booked { background: var(--amber); }
  .stage-dot.met { background: var(--accent); }
  .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .student-card.open .chevron { transform: rotate(180deg); color: rgba(255,255,255,0.5); }

  .student-card-body { display: none; padding: 20px 18px; border-top: 1px solid var(--cream); }
  .student-card.open .student-card-body { display: block; }

  .sec-label {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 7px; margin-top: 18px;
  }
  .sec-label:first-child { margin-top: 0; }

  .interests-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .interest-badge {
    padding: 3px 8px; font-size: 10px; border-radius: 2px;
    background: var(--amber-light); color: var(--amber); border: 1px solid #e8d0a0;
  }
  .interest-badge.one-cr { background: #e8eef5; color: #1a3a5a; border-color: #b0c4d8; }

  .course-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  @media (max-width: 600px) { .course-grid { grid-template-columns: 1fr; } }

  .course-check-row {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 10px; border: 1px solid var(--rule); border-radius: 2px;
    cursor: pointer; font-size: 11px; background: white; transition: all 0.1s; line-height: 1.4;
  }
  .course-check-row:hover { border-color: var(--accent); }
  .course-check-row.checked { background: var(--accent); color: white; border-color: var(--accent); }
  .course-check-row.checked-1cr { background: #1a3a5a; color: white; border-color: #1a3a5a; }
  .course-check-row.interested { border-color: var(--amber); background: #fffbf0; }
  .course-check-row.checked.interested { border-color: var(--accent); background: var(--accent); }
  .chk {
    width: 14px; height: 14px; border: 1.5px solid var(--rule); border-radius: 2px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; margin-top: 1px;
  }
  .checked .chk, .checked-1cr .chk { border-color: white; color: white; }
  .course-name { font-size: 11px; }
  .course-prof { font-size: 9px; opacity: 0.65; margin-top: 1px; }

  .one-cr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 5px; }

  .notes-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 640px) { .notes-row { grid-template-columns: 1fr; } }

  .note-field label {
    display: block; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 5px;
  }
  textarea.note-ta {
    width: 100%; padding: 9px 10px; font-family: 'DM Mono', monospace; font-size: 11px;
    border: 1px solid var(--rule); background: var(--paper); border-radius: 2px;
    resize: vertical; min-height: 72px; color: var(--ink); line-height: 1.5;
    transition: border-color 0.15s;
  }
  textarea.note-ta:focus { outline: none; border-color: var(--ink); }
  .save-ind { font-size: 9px; color: var(--muted); text-align: right; margin-top: 2px; min-height: 12px; }
  .save-ind.saving { color: var(--amber); }
  .save-ind.saved { color: var(--accent); }
  .save-ind.error { color: var(--warn); }

  .card-actions { display: flex; gap: 10px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
  .btn-met {
    padding: 9px 20px; font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.05em; text-transform: uppercase; background: var(--accent);
    color: white; border: none; border-radius: 2px; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-met:hover { opacity: 0.85; }
  .btn-met:disabled { opacity: 0.4; cursor: not-allowed; }
  .met-label { font-size: 11px; color: var(--accent); font-weight: 500; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 12px; }

  .fill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .fill-card { background: white; border: 1px solid var(--rule); border-radius: 2px; padding: 14px; }
  .fill-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; }
  .fill-prof { font-size: 10px; color: var(--muted); margin-bottom: 10px; }
  .fill-bar-wrap { background: var(--cream); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .fill-bar { height: 100%; border-radius: 3px; background: var(--accent); }
  .fill-bar.amber { background: var(--amber); }
  .fill-bar.warn { background: var(--warn); }
  .fill-counts { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
  .fill-credit-tag { display: inline-block; padding: 1px 6px; font-size: 9px; background: var(--cream); color: var(--muted); border-radius: 2px; margin-bottom: 8px; }

  /* ── SCHEDULE TAB ── */
  .sched-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 700px) { .sched-wrap { grid-template-columns: 1fr; } }

  .sched-advisor-block { }
  .sched-advisor-title {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 500; color: var(--paper); background: var(--ink);
    padding: 8px 14px; border-radius: 2px 2px 0 0; margin-bottom: 0;
  }
  .sched-day-block { border: 1px solid var(--rule); border-top: none; background: white; }
  .sched-day-block:first-of-type { border-top: 1px solid var(--rule); }
  .sched-day-label {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); background: var(--cream);
    padding: 6px 12px; border-bottom: 1px solid var(--rule);
  }
  .sched-slot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px; border-bottom: 1px solid var(--cream); font-size: 11px;
  }
  .sched-slot:last-child { border-bottom: none; }
  .sched-slot.is-break { opacity: 0.4; font-style: italic; }
  .sched-slot-time { color: var(--muted); width: 72px; flex-shrink: 0; }
  .sched-slot-name { flex: 1; font-size: 11px; color: var(--ink); }
  .sched-slot-name.open { color: var(--muted); font-style: italic; }
  .sched-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-left: 8px; }
  .sched-dot.open { background: var(--cream); border: 1px solid var(--rule); }
  .sched-dot.booked { background: var(--amber); }
  .sched-dot.met { background: var(--accent); }

  .sched-legend {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    font-size: 10px; color: var(--muted);
  }
  .sched-legend-item { display: flex; align-items: center; gap: 5px; }
  .sched-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .sched-summary {
    font-size: 10px; color: var(--muted); padding: 8px 12px;
    background: var(--cream); border-top: 1px solid var(--rule);
    display: flex; gap: 16px;
  }
</style>
</head>
<body>

<div class="picker" id="picker">
  <div class="picker-title">IMA MFA Advising</div>
  <div class="picker-sub">Select your name to see your appointments</div>
  <div class="picker-btns">
    <button class="picker-btn" onclick="selectAdvisor('Andrew')">Andrew</button>
    <button class="picker-btn" onclick="selectAdvisor('Betty')">Betty</button>
  </div>
</div>

<div class="main" id="mainView">
  <div class="masthead">
    <div class="masthead-left">
      <div class="masthead-title">Advising</div>
      <div class="masthead-advisor" id="advisorLabel"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="switch-btn" onclick="switchTab('students')" id="tabStudents" style="opacity:1">My Students</button>
      <button class="switch-btn" onclick="switchTab('fill')" id="tabFill">Class Fill</button>
      <button class="switch-btn" onclick="switchTab('schedule')" id="tabSchedule">Full Schedule</button>
      <button class="switch-btn" onclick="switchAdvisor()">Switch advisor</button>
    </div>
  </div>
  <div class="content">
    <div id="viewStudents"><div id="studentList"><div class="empty-state">Loading your appointments…</div></div></div>
    <div id="viewFill" style="display:none"><div id="fillContent"><div class="empty-state">Loading class fill…</div></div></div>
    <div id="viewSchedule" style="display:none"><div id="schedContent"><div class="empty-state">Loading schedule…</div></div></div>
  </div>
</div>

<script>
const CONFIG = { APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzd46VHE4ZRa7r5XqB55Ba-LqEZTSPZt809W2b00F21virlMHYYJIp9qTpD7B3JONc0/exec' };

const COURSES_3CR = [
  {id:'IMA78041', name:'Blank Screen', prof:'Zach Nader'},
  {id:'IMA78054', name:'Impact Producing', prof:'Cecilia Mejia'},
  {id:'IMA70900', name:'History and Theory of Documentary', prof:'Reiko Tahara'},
  {id:'IMA75000', name:'Emerging Media 1', prof:'Ricardo Miranda'},
  {id:'IMA78087', name:'Digital Resistance', prof:'kara lynch'},
  {id:'IMA78052', name:'Story Strategies', prof:'Andrew Lund'},
  {id:'IMA78065', name:'Language to be Looked At', prof:'Andrew Demirjian'},
  {id:'IMA77100', name:'Community Media & The Urban Environment', prof:'Amber Bemak'},
  {id:'IMA75300', name:'Doc 2: The Short Film', prof:'Alex Mallis'},
  {id:'IMA75100', name:'Documentary 1', prof:'Edwin Martinez'},
  {id:'IMA78081', name:'Sound Environments', prof:'Hans Tammen'},
  {id:'IMA76600', name:'Memory Chamber', prof:'Poyen Wang'},
  {id:'IMA78077', name:'Experimental Darkroom (Summer)', prof:'Christina Freeman'},
  {id:'IMA78079', name:'Sound Design for Filmmakers (Summer)', prof:'David Briggs'},
];
const COURSES_1CR = [
  {id:'IMA78302', name:'Lighting', prof:'Sean Hanley'},
  {id:'IMA78313', name:'Premiere Editing & Post Production', prof:'Iris Devins'},
  {id:'IMA78301', name:'Sound Recording', prof:'JT Takagi'},
  {id:'IMA78360', name:'Impact Producing Workshop', prof:'Cecilia Mejia'},
  {id:'IMA78349', name:'From Body to Movement (Summer)', prof:'Yehui Zhao'},
];

let currentAdvisor = null;
let allStudents = [];
let allSlots = {};
let saveTimers = {};

async function api(action, params) {
  const url = CONFIG.APPS_SCRIPT_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(params));
  const r = await fetch(url);
  return r.json();
}

function selectAdvisor(name) {
  currentAdvisor = name;
  document.getElementById('picker').style.display = 'none';
  document.getElementById('mainView').classList.add('active');
  document.getElementById('advisorLabel').textContent = name;
  loadStudents();
}

function switchAdvisor() {
  document.getElementById('picker').style.display = 'flex';
  document.getElementById('mainView').classList.remove('active');
  document.getElementById('studentList').innerHTML = '<div class="empty-state">Loading your appointments…</div>';
  currentAdvisor = null;
  allStudents = [];
  allSlots = {};
}

function switchTab(tab) {
  ['students','fill','schedule'].forEach(t => {
    document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = tab === t ? 'block' : 'none';
    const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) btn.style.opacity = tab === t ? '1' : '0.5';
  });
}

function renderFill(students) {
  const counts = {};
  students.forEach(s => {
    [...(s.courseInterests||[]),...(s.courseInterests1||[])].forEach(c => {
      if (!counts[c]) counts[c] = { interested: 0, confirmed: 0 };
      counts[c].interested++;
    });
    (s.finalCourses||[]).forEach(c => {
      if (!counts[c]) counts[c] = { interested: 0, confirmed: 0 };
      counts[c].confirmed++;
    });
  });
  const allCourses = [...COURSES_3CR, ...COURSES_1CR];
  document.getElementById('fillContent').innerHTML = '<div class="fill-grid">' + allCourses.map(course => {
    const c = counts[course.name] || { interested: 0, confirmed: 0 };
    const cap = 15, pct = Math.min(100, Math.round((c.interested / cap) * 100));
    const barClass = pct >= 90 ? 'warn' : pct >= 70 ? 'amber' : '';
    const creditTag = COURSES_1CR.find(x => x.id === course.id) ? '1 credit' : '3 credits';
    return `<div class="fill-card">
      <div class="fill-credit-tag">${creditTag}</div>
      <div class="fill-name">${course.name}</div>
      <div class="fill-prof">${course.prof}</div>
      <div class="fill-bar-wrap"><div class="fill-bar ${barClass}" style="width:${pct}%"></div></div>
      <div class="fill-counts"><span>${c.interested} interested</span><span>${c.confirmed} confirmed</span></div>
    </div>`;
  }).join('') + '</div>';
}

function renderSchedule(students, slots) {
  // Build a lookup: slotId → student
  const bookingMap = {};
  students.forEach(s => {
    if (s.slotId && s.advisor) {
      bookingMap[s.slotId] = s;
    }
  });

  const advisors = ['Andrew', 'Betty'];
  let html = '<div class="sched-legend">';
  html += '<div class="sched-legend-item"><div class="sched-legend-dot" style="background:var(--cream);border:1px solid var(--rule)"></div> Open</div>';
  html += '<div class="sched-legend-item"><div class="sched-legend-dot" style="background:var(--amber)"></div> Booked</div>';
  html += '<div class="sched-legend-item"><div class="sched-legend-dot" style="background:var(--accent)"></div> Met</div>';
  html += '</div>';
  html += '<div class="sched-wrap">';

  advisors.forEach(advisor => {
    const days = (slots[advisor] || []);
    let totalSlots = 0, bookedSlots = 0;

    let advisorHtml = `<div class="sched-advisor-block">`;
    advisorHtml += `<div class="sched-advisor-title">${advisor}</div>`;

    days.forEach(day => {
      const bookableSlots = day.slots.filter(sl => !sl.isBreak);
      totalSlots += bookableSlots.length;

      advisorHtml += `<div class="sched-day-block">`;
      advisorHtml += `<div class="sched-day-label">${day.label}</div>`;

      day.slots.forEach(slot => {
        if (slot.isBreak) {
          advisorHtml += `<div class="sched-slot is-break"><span class="sched-slot-time">${slot.time}</span><span class="sched-slot-name" style="color:var(--rule)">— break —</span></div>`;
          return;
        }

        const slotId = advisor + '_' + day.id + '_' + slot.time;
        const student = bookingMap[slotId] || slot.bookedBy && { name: slot.bookedBy, stage: 1 };
        let dotClass = 'open', nameHtml = '<span class="sched-slot-name open">Open</span>';

        if (student) {
          bookedSlots++;
          dotClass = student.stage >= 2 ? 'met' : 'booked';
          nameHtml = `<span class="sched-slot-name">${student.name}</span>`;
        }

        advisorHtml += `<div class="sched-slot">
          <span class="sched-slot-time">${slot.time}</span>
          ${nameHtml}
          <div class="sched-dot ${dotClass}"></div>
        </div>`;
      });

      advisorHtml += `</div>`; // sched-day-block
    });

    const openSlots = totalSlots - bookedSlots;
    advisorHtml += `<div class="sched-summary">
      <span>${bookedSlots} booked</span>
      <span>${openSlots} open</span>
      <span>${totalSlots} total</span>
    </div>`;
    advisorHtml += `</div>`; // sched-advisor-block
    html += advisorHtml;
  });

  html += '</div>';
  document.getElementById('schedContent').innerHTML = html;
}

async function loadStudents() {
  try {
    const res = await api('getAdminData', {});
    const students = res.students || [];
    allSlots = res.slots || {};

    allStudents = students
      .filter(s => s.advisor === currentAdvisor && s.stage >= 1)
      .sort((a, b) => {
        if (a.slotDay !== b.slotDay) return a.slotDay < b.slotDay ? -1 : 1;
        return a.slotTime < b.slotTime ? -1 : 1;
      });

    renderStudents();
    renderFill(students);
    renderSchedule(students, allSlots);
  } catch(e) {
    document.getElementById('studentList').innerHTML = '<div class="empty-state">Error loading. Please refresh.</div>';
  }
}

function renderStudents() {
  const el = document.getElementById('studentList');
  if (!allStudents.length) {
    el.innerHTML = '<div class="empty-state">No appointments booked yet.</div>';
    return;
  }
  const byDay = {};
  allStudents.forEach(s => {
    const day = s.slotDay || 'Unscheduled';
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(s);
  });
  el.innerHTML = Object.entries(byDay).map(([day, students]) =>
    `<div class="day-section">
      <div class="day-heading">${day}</div>
      ${students.map(s => renderCard(s)).join('')}
    </div>`
  ).join('');
}

function renderCard(s) {
  const interests3 = s.courseInterests || [];
  const interests1 = s.courseInterests1 || [];
  const final = s.finalCourses || [];
  const dotClass = s.stage >= 2 ? 'met' : 'booked';

  const badges3 = interests3.map(i => `<span class="interest-badge">${i}</span>`).join('');
  const badges1 = interests1.map(i => `<span class="interest-badge one-cr">${i}</span>`).join('');

  const courses3html = COURSES_3CR.map(c => {
    const checked = final.includes(c.name);
    const interested = interests3.includes(c.name);
    return `<div class="course-check-row${checked?' checked':''}${interested&&!checked?' interested':''}"
      onclick="toggleCourse(this,'${s.emplid}','${c.name.replace(/'/g,"\\'")}','3cr')">
      <div class="chk">${checked?'✓':''}</div>
      <div><div class="course-name">${interested?'★ ':''}${c.name}</div><div class="course-prof">${c.prof}</div></div>
    </div>`;
  }).join('');

  const courses1html = COURSES_1CR.map(c => {
    const checked = final.includes(c.name);
    const interested = interests1.includes(c.name);
    return `<div class="course-check-row${checked?' checked-1cr':''}${interested&&!checked?' interested':''}"
      onclick="toggleCourse(this,'${s.emplid}','${c.name.replace(/'/g,"\\'")}','1cr')">
      <div class="chk">${checked?'✓':''}</div>
      <div><div class="course-name">${interested?'★ ':''}${c.name}</div><div class="course-prof">${c.prof}</div></div>
    </div>`;
  }).join('');

  const metBtn = s.stage === 1
    ? `<button class="btn-met" onclick="markMet('${s.emplid}', this)">Mark as Met + Send Follow-up Email</button>`
    : `<span class="met-label">✓ Met — follow-up email sent</span>`;

  return `<div class="student-card" id="card-${s.emplid}">
    <div class="student-card-header" onclick="toggleCard('${s.emplid}')">
      <div>
        <div class="student-name">${s.name}</div>
        <div class="student-meta">${s.credits?s.credits+' credits · ':''}EMPLID ${s.emplid}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="slot-time">${s.slotTime||''}</div>
        <div class="stage-dot ${dotClass}"></div>
        <div class="chevron">▾</div>
      </div>
    </div>
    <div class="student-card-body">

      ${(badges3||badges1) ? `
        <div class="sec-label">Student's Course Interests</div>
        <div class="interests-list">${badges3}${badges1}</div>
        ${s.notes?`<div style="font-size:11px;color:var(--muted);margin-top:8px;font-style:italic">"${s.notes}"</div>`:''}
      ` : ''}

      <div class="sec-label" style="margin-top:${badges3||badges1?'18px':'0'}">
        3-Credit Courses &nbsp;<span style="font-weight:normal;color:var(--amber);font-size:9px">★ = student interested</span>
      </div>
      <div class="course-grid" id="grid3-${s.emplid}">${courses3html}</div>

      <div class="sec-label" style="margin-top:14px">1-Credit Workshops</div>
      <div class="one-cr-grid" id="grid1-${s.emplid}">${courses1html}</div>

      <div class="sec-label" style="margin-top:18px">Notes</div>
      <div class="notes-row">
        <div class="note-field">
          <label>Meeting Notes</label>
          <textarea class="note-ta" data-field="advisorNotes" data-emplid="${s.emplid}"
            placeholder="Notes from this meeting…">${s.advisorNotes||s.notes||''}</textarea>
          <div class="save-ind" id="ind-advisorNotes-${s.emplid}"></div>
        </div>
        <div class="note-field">
          <label>Program Feedback</label>
          <textarea class="note-ta" data-field="programFeedback" data-emplid="${s.emplid}"
            placeholder="Program progress, trajectory, concerns…">${s.programFeedback||''}</textarea>
          <div class="save-ind" id="ind-programFeedback-${s.emplid}"></div>
        </div>
        <div class="note-field">
          <label>Other Notes</label>
          <textarea class="note-ta" data-field="otherNotes" data-emplid="${s.emplid}"
            placeholder="Anything else…">${s.otherNotes||''}</textarea>
          <div class="save-ind" id="ind-otherNotes-${s.emplid}"></div>
        </div>
      </div>

      <div class="card-actions">${metBtn}</div>
    </div>
  </div>`;
}

function toggleCard(emplid) {
  document.getElementById('card-' + emplid).classList.toggle('open');
}

function toggleCourse(el, emplid, name, type) {
  const cls = type === '3cr' ? 'checked' : 'checked-1cr';
  const wasChecked = el.classList.contains(cls);
  if (wasChecked) { el.classList.remove(cls); el.querySelector('.chk').textContent = ''; }
  else { el.classList.add(cls); el.querySelector('.chk').textContent = '✓'; }
  saveCourses(emplid);
}

function saveCourses(emplid) {
  const selected3 = [], selected1 = [];
  document.querySelectorAll(`#grid3-${emplid} .checked .course-name`).forEach(el => {
    selected3.push(el.textContent.replace('★ ', ''));
  });
  document.querySelectorAll(`#grid1-${emplid} .checked-1cr .course-name`).forEach(el => {
    selected1.push(el.textContent.replace('★ ', ''));
  });
  const courses = [...selected3, ...selected1];
  const s = allStudents.find(x => String(x.emplid) === String(emplid));
  if (s) s.finalCourses = courses;

  clearTimeout(saveTimers['courses-' + emplid]);
  saveTimers['courses-' + emplid] = setTimeout(async () => {
    try { await api('saveFinalCourses', { emplid, courses }); } catch(e) {}
  }, 800);
}

document.addEventListener('input', function(e) {
  if (!e.target.classList.contains('note-ta')) return;
  const field = e.target.dataset.field;
  const emplid = e.target.dataset.emplid;
  const value = e.target.value;
  const indId = 'ind-' + field + '-' + emplid;
  const ind = document.getElementById(indId);
  clearTimeout(saveTimers[indId]);
  if (ind) { ind.textContent = 'Unsaved…'; ind.className = 'save-ind'; }
  saveTimers[indId] = setTimeout(async () => {
    if (ind) { ind.textContent = 'Saving…'; ind.className = 'save-ind saving'; }
    try {
      await api('saveAdvisorNotes', { emplid, field, value });
      if (ind) {
        ind.textContent = 'Saved ✓'; ind.className = 'save-ind saved';
        setTimeout(() => { if (ind) { ind.textContent = ''; ind.className = 'save-ind'; } }, 2000);
      }
    } catch(err) {
      if (ind) { ind.textContent = 'Error'; ind.className = 'save-ind error'; }
    }
  }, 1000);
});

async function markMet(emplid, btn) {
  if (!confirm('Mark as met? This sends the student a follow-up email to confirm their final course selections.')) return;
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const res = await api('markMet', { emplid });
    if (res.success) {
      const s = allStudents.find(x => String(x.emplid) === String(emplid));
      if (s) s.stage = 2;
      btn.parentElement.innerHTML = '<span class="met-label">✓ Met — follow-up email sent</span>';
      const dot = document.querySelector(`#card-${emplid} .stage-dot`);
      if (dot) dot.className = 'stage-dot met';
    } else {
      alert('Error: ' + (res.message || 'Could not update.')); btn.disabled = false;
      btn.textContent = 'Mark as Met + Send Follow-up Email';
    }
  } catch(e) {
    alert('Connection error. Please try again.'); btn.disabled = false;
    btn.textContent = 'Mark as Met + Send Follow-up Email';
  }
}
</script>
</body>
</html>
